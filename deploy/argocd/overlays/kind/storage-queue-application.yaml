apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: solthoth-hello-world-api-go-queue
spec:
  destination:
    namespace: app-solthoth-hello-world-api-go
    server: https://kubernetes.default.svc
  source:
    path: deploy/crossplane/overlays/kind
    repoURL: https://github.com/solthoth/hello-world-api.go.git
    targetRevision: main
  project: kind-cluster
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
